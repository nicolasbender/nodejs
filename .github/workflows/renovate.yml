name: Renovate

on:
  workflow_dispatch:
jobs:
  renovate:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Self-hosted Renovate
      uses: renovatebot/github-action@v41.0.22
      with:
        configurationFile: renovate-config.js
        token: ${{ secrets.RENOVATE_TOKEN }}